{% load socialaccount %}
<form method="POST" action=""
      class="flex flex-col gap-5">
    {% csrf_token %}

    {% if form.errors %}
    <div class="flex items-center gap-2 bg-red-900/30 border border-red-700/50 rounded-xl px-4 py-3 text-red-400 text-sm">
        <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        Correo electrónico o contraseña incorrectos.
    </div>
    {% endif %}

    <div class="flex flex-col gap-1">
        <label for="id_login" class="text-sm font-semibold text-white">Correo Electrónico</label>
        <input id="id_login" name="login" type="email" placeholder="correo@ucjc.edu"
               value="{{ form.login.value|default:'' }}"
               class="bg-transparent border-b border-zinc-600 py-2 text-white placeholder-zinc-500 text-sm focus:outline-none focus:border-zinc-400 transition-colors">
    </div>

    <div class="flex flex-col gap-1">
        <label for="id_password" class="text-sm font-semibold text-white">Contraseña</label>
        <div class="relative flex items-center border-b border-zinc-600 focus-within:border-zinc-400 transition-colors">
            <input id="id_password" name="password" type="password" placeholder="••••••••"
                   class="bg-transparent w-full py-2 text-white placeholder-zinc-500 text-sm focus:outline-none pr-8">
            <button type="button" id="toggle-password"
                    class="absolute right-0 bottom-0 h-full flex items-center text-zinc-500 hover:text-zinc-300 transition-colors"
                    aria-label="Mostrar contraseña">
                <span id="eye-icon" class="w-5 h-5 flex items-center justify-center">{% include 'login/icons/eye.svg' %}</span>
            </button>
        </div>
    </div>

    <button type="submit"
            class="mt-2 w-full py-3 rounded-full bg-red-600 hover:bg-red-500 active:bg-red-700 text-white font-bold text-base tracking-wide transition-colors">
        Iniciar Sesión
    </button>
</form>
